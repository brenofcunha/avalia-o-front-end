<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora de IMC</title>
    <style>
      :root {
        --bg-start: #eef6ff;
        --bg-end: #dcecff;
        --card-bg: #ffffff;
        --text-main: #16325c;
        --text-soft: #4b5d7a;
        --border: #bfd1ee;
        --primary: #1f5eff;
        --danger: #c62828;
        --result-bg: #f3f8ff;
        --result-border: #d7e4fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
        font-family: "Segoe UI", sans-serif;
      }

      .card {
        width: 100%;
        max-width: 420px;
        padding: 32px;
        border-radius: 20px;
        background: var(--card-bg);
        box-shadow: 0 18px 45px rgba(31, 61, 115, 0.15);
      }

      h1 {
        margin: 0 0 8px;
        color: var(--text-main);
        font-size: 1.9rem;
      }

      .subtitle {
        margin: 0 0 24px;
        color: var(--text-soft);
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        color: var(--text-main);
        font-weight: 600;
      }

      input {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px 14px;
        font-size: 1rem;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        border-radius: 12px;
        padding: 12px 18px;
        font-weight: 700;
        cursor: pointer;
        font-size: 0.95rem;
      }

      .primary {
        border: none;
        background: var(--primary);
        color: #fff;
      }

      .secondary {
        border: 1px solid #b7c8e6;
        background: #fff;
        color: var(--text-main);
      }

      .error {
        margin-top: 18px;
        color: var(--danger);
        font-weight: 600;
      }

      .result {
        margin-top: 24px;
        padding: 18px;
        border-radius: 16px;
        background: var(--result-bg);
        border: 1px solid var(--result-border);
      }

      .result p {
        margin: 0 0 8px;
        color: var(--text-main);
      }

      .result p:last-child {
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState } = React;

      function classificarImc(imc) {
        if (imc < 18.5) return "Abaixo do peso";
        if (imc < 25) return "Peso normal";
        if (imc < 30) return "Sobrepeso";
        if (imc < 35) return "Obesidade grau I";
        if (imc < 40) return "Obesidade grau II";
        return "Obesidade grau III";
      }

      function CalculadoraIMC() {
        const [peso, setPeso] = useState("");
        const [altura, setAltura] = useState("");
        const [resultado, setResultado] = useState(null);
        const [erro, setErro] = useState("");

        const handleSubmit = (event) => {
          event.preventDefault();

          const pesoNumero = Number(peso);
          const alturaNumero = Number(altura);

          if (!pesoNumero || !alturaNumero || pesoNumero <= 0 || alturaNumero <= 0) {
            setResultado(null);
            setErro("Informe valores válidos para peso e altura.");
            return;
          }

          const imc = pesoNumero / (alturaNumero * alturaNumero);

          setResultado({
            imc: imc.toFixed(2),
            classificacao: classificarImc(imc)
          });
          setErro("");
        };

        const handleLimpar = () => {
          setPeso("");
          setAltura("");
          setResultado(null);
          setErro("");
        };

        return (
          <section className="card">
            <h1>Calculadora de IMC</h1>
            <p className="subtitle">
              Digite o peso em quilogramas e a altura em metros.
            </p>

            <form onSubmit={handleSubmit}>
              <label>
                Peso (kg)
                <input
                  type="number"
                  step="0.1"
                  min="0"
                  value={peso}
                  onChange={(event) => setPeso(event.target.value)}
                  placeholder="Ex.: 72.5"
                />
              </label>

              <label>
                Altura (m)
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  value={altura}
                  onChange={(event) => setAltura(event.target.value)}
                  placeholder="Ex.: 1.75"
                />
              </label>

              <div className="actions">
                <button type="submit" className="primary">Calcular IMC</button>
                <button type="button" className="secondary" onClick={handleLimpar}>
                  Limpar
                </button>
              </div>
            </form>

            {erro ? <p className="error">{erro}</p> : null}

            {resultado ? (
              <div className="result">
                <p>
                  Seu IMC é <strong>{resultado.imc}</strong>
                </p>
                <p>
                  Classificação: <strong>{resultado.classificacao}</strong>
                </p>
              </div>
            ) : null}
          </section>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<CalculadoraIMC />);
    </script>
  </body>
</html>
